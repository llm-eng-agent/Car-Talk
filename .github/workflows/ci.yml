name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline:
    name: Python pipeline (lint, type, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # CI uses only fixtures and mocks — no live OpenAI or Qdrant calls (spec 27A).
      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Tests
        run: uv run pytest
